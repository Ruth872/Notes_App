<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/siimple-icons/siimple-icons.css" />
</head>
<body>
    <div class="main-container">
       <div class="sidebar">
            <div class="app-logo">Notepad</div>

            <div class="section-container">

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-note"></i>
                    </div>
                    <div class="section-item-name">Notes</div>
                </div>

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-notebook"></i>
                    </div>
                    <div class="section-item-name">Bookmark</div>
                </div>

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-palette"></i>
                    </div>
                    <div class="section-item-name">Memories</div>
                </div>
                
            </div>
       </div> 

       <div class="main-tab">
        <div class="header-container">
            <div class="header-text">Recent</div>
            <a href="./create-new.html">
                <div class="add-button">
                    <i class=" si-plus"></i>
                </div>
            </a>
        </div>
       
 
        <div class="task">
            <div class="task-header">
                <div class="task-name">Task name</div>
                <div class="task-state-done">Done</div>
                <!-- <div class="task-state-not-done">Not done</div> -->
            </div>
        </div>



        <div class="note">
            <div class="task-header">
                <div class="task-name">Note name</div>
                <div class="note-type">Bookmark</div>
            </div>

            <div class="note-text">
                we wkendw e dwendklwe dwekjndkwndbwekjd wkjew
            </div>
        </div>
        

       </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
