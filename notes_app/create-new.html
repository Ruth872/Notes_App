<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/siimple-icons/siimple-icons.css" />
</head>
<body>
    <div class="main-container">
       <div class="sidebar">
            <div class="app-logo">Notepad</div>

            <div class="section-container">

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-note"></i>
                    </div>
                    <div class="section-item-name">Notes</div>
                </div>

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-notebook"></i>
                    </div>
                    <div class="section-item-name">Bookmark</div>
                </div>

                <div class="section-item2">
                    <div class="section-item-icon">
                        <i class=" si-palette"></i>
                    </div>
                    <div class="section-item-name">Memories</div>
                </div>
                
            </div>
       </div> 

       <div class="main-tab">
        <div class="header-container">
            <div id="header-text" class="header-text">Create New</div>
            <div id="save-note" class="save-note">save</div>
        </div>
       
        <div id="select-elements-container" class="select-elements-container">
            <div id="note-selector" class="select-element">
                Note
            </div>
            <div id="task-selector" class="select-element">
                Task
            </div>
        </div>
 


        <div id="create-note-tab" class="create-note">
            <!-- <input type="text" class="note-text-area"/> -->
            <textarea placeholder="start typing..." class="note-text-area" rows="39" cols="88"></textarea>
        </div>


        
        <!-- task ui -->
        


       </div>
    </div>


    <script src="./create-script.js"></script>
</body>
</html>
